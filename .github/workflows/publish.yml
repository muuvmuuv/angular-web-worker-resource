name: Publish Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Update npm
        run: npm install -g npm@latest

      - name: Run check
        run: pnpm check

      - name: Build lib
        working-directory: projects/angular-web-worker-resource
        run: pnpm build

      - name: Publish lib
        working-directory: projects/angular-web-worker-resource/dist
        run: npm publish
